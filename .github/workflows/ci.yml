name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "docs/**"
      - "ci/**"
      - "style/**"
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # A lockfile that lists a platform-specific package without the optional
      # flag makes `npm ci` abort with EBADPLATFORM on every other platform —
      # which reads like a random dependency error rather than a broken tree.
      - name: Validate package-lock.json
        run: |
          node -e "
            const lock = require('./package-lock.json');
            const bad = Object.entries(lock.packages)
              .filter(([, p]) => (p.os || p.cpu) && !p.optional)
              .map(([name]) => name);
            if (bad.length) {
              console.error('Platform-specific packages missing \"optional\": true:');
              for (const name of bad) console.error('  ' + name);
              console.error('Regenerate the lockfile with: rm -rf node_modules package-lock.json && npm install');
              process.exit(1);
            }
            console.log('package-lock.json installable on every platform');
          "

      - run: npm ci

      # Same rules the Obsidian community review runs (eslint-plugin-obsidianmd
      # plus typescript-eslint's type-checked set). Zero tolerance: a warning
      # here is a finding in the review.
      - name: ESLint
        run: npx eslint src/ --max-warnings 0

      # The review type-checks without @types/node, where every Node API reads
      # as `any`. Linting that way too keeps those findings from reappearing
      # only after a submission.
      - name: ESLint (review environment)
        run: npx eslint src/ --config eslint.review.config.mjs --max-warnings 0

      - name: Stylelint
        run: npx stylelint styles.css

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Prettier
        run: npx prettier --check "src/**/*.ts" "tests/**/*.ts" "styles.css"

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            const required = ['id','name','version','minAppVersion','description','author','isDesktopOnly'];
            const missing = required.filter(k => !(k in m));
            if (missing.length) { console.error('Missing:', missing); process.exit(1); }
            if (m.id.includes('obsidian')) { console.error('Plugin ID must not contain obsidian'); process.exit(1); }
            if (m.id.endsWith('plugin')) { console.error('Plugin ID must not end with plugin'); process.exit(1); }
            if (m.description.length > 250) { console.error('Description exceeds 250 chars'); process.exit(1); }
            console.log('manifest.json valid');
          "

      - name: Commitlint
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} \
                          --to ${{ github.event.pull_request.head.sha }}
